backend:
  name: git-gateway
  branch: main

locale: es

collections:
  - name: "blog"
    label: "Blog"
    files:
      - name: "posts"
        label: "Entradas del Blog"
        file: "posts.json"
        fields:
          - name: posts
            label: Entradas
            widget: list
            label_singular: Entrada
            fields:
              - { label: "Título", name: title, widget: string }
              - { label: "Categoría", name: category, widget: string, hint: "Ej: Gestión de Equipos" }
              - { label: "Tiempo de lectura", name: readtime, widget: string, hint: "Ej: 4 min" }
              - { label: "Frase destacada (cursiva naranja)", name: excerpt, widget: text }
              - { label: "Contenido", name: content, widget: markdown }
              - { label: "Título del CTA", name: cta_title, widget: string }
              - { label: "Subtítulo del CTA", name: cta_subtitle, widget: string }
              - { label: "Botón del CTA", name: cta_button, widget: string, default: "Conversemos →" }
